version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nomadsocks
      POSTGRES_USER: nomadsocks
      POSTGRES_PASSWORD: nomadsocks_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DJANGO_SETTINGS_MODULE: nomadsocks.settings_prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgres://nomadsocks:nomadsocks_password@db:5432/nomadsocks
      FRONTEND_URL: http://localhost
    depends_on:
      - db
    ports:
      - "8001:8000"
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/usr/share/nginx/html:ro
      - media_data:/usr/share/nginx/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
